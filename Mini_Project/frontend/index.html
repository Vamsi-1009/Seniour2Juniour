<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Exchange</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<script>
  // ✅ CHECK AUTH BEFORE PAGE RENDERS
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "login.html";
  }
</script>

<!-- NAVBAR WITH USERNAME + PROFILE DROPDOWN -->
<header class="navbar">
  <!-- Welcome Message with Username (LEFT) -->
  <div class="welcome-section">
    <span class="welcome-text">Welcome, </span>
    <span class="user-name-left" id="userNameLeft">User</span>
  </div>

  <!-- Logo (CENTER) -->
  <div class="logo">Academic Exchange</div>
  
  <!-- Profile Dropdown (RIGHT) -->
  <div class="profile-dropdown">
    <button class="profile-btn" onclick="toggleDropdown()">
      <span class="profile-icon">👤</span>
      <span class="profile-name" id="userName">User</span>
      <span class="dropdown-arrow">▼</span>
    </button>
    
    <div class="dropdown-menu" id="dropdownMenu">
      <a href="add-product.html" class="dropdown-item">➕ Add Item</a>
      <a href="my-products.html" class="dropdown-item">📦 My Products</a>
      <a href="#" onclick="logout()" class="dropdown-item logout-item">🚪 Logout</a>
    </div>
  </div>
</header>

<main class="page">
  <h2 class="section-title">Recommended for Students</h2>

  <!-- TOP SEARCH + FILTER ICON -->
  <div class="top-filter-bar">
    <input type="text" id="searchInput" class="big-search" placeholder="Search books, subjects, notes...">
    <button class="filter-icon-btn" onclick="toggleFilters()">⇅</button>
  </div>

  <!-- FILTER PANEL -->
  <div id="filterPanel" class="filter-panel hidden">
    <label>Max Price: ₹<span id="priceValue">1000</span></label>
    <input type="range" id="priceSlider" min="0" max="2000" value="1000" oninput="priceValue.innerText=this.value">
    <div class="filter-actions">
      <button onclick="applyFilters()" class="primary-btn">Apply</button>
      <button onclick="clearFilters()" class="clear-btn">Clear</button>
    </div>
  </div>

  <!-- LISTINGS GRID - LOADED BY app.js -->
  <div id="listings" class="product-grid">
      <div class="product-card" onclick="openProduct('2')">
        <img src="http://localhost:5000/uploads/1767170756311.jpg" alt="naru" onerror="this.src='/uploads/demo.jpg'">
        <div class="product-info">
          <div class="product-title">naru</div>
          <div class="product-price">₹120</div>
          <span class="badge">sell</span>
        </div>
      </div>
    
      <div class="product-card" onclick="openProduct('1')">
        <img src="http://localhost:5000/uploads/1766861530248.jpg" alt="new one" onerror="this.src='/uploads/demo.jpg'">
        <div class="product-info">
          <div class="product-title">new one</div>
          <div class="product-price">₹100</div>
          <span class="badge">sell</span>
        </div>
      </div>
    </div>
</main>

<script src="./js/app.js"></script>

<script>
  // ========== PROFILE DROPDOWN FUNCTIONALITY ==========

  // Toggle dropdown menu
  function toggleDropdown() {
    const menu = document.getElementById('dropdownMenu');
    const btn = document.querySelector('.profile-btn');
    
    menu.classList.toggle('show');
    btn.classList.toggle('active');
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function(event) {
    const profile = document.querySelector('.profile-dropdown');
    if (profile && !profile.contains(event.target)) {
      document.getElementById('dropdownMenu').classList.remove('show');
      document.querySelector('.profile-btn').classList.remove('active');
    }
  });

  // Set user name in profile button AND welcome section
  function setUserProfile() {
    const userName = localStorage.getItem('userName') || 'User';
    
    // Set username in right corner (profile dropdown)
    const userNameEl = document.getElementById('userName');
    if (userNameEl) {
      userNameEl.textContent = userName;
    }

    // Set username in left corner (welcome message)
    const userNameLeftEl = document.getElementById('userNameLeft');
    if (userNameLeftEl) {
      userNameLeftEl.textContent = userName;
    }
  }

  // Logout function
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('userId');
    localStorage.removeItem('userName');
    window.location.href = 'login.html';
  }

  // Run on page load
  window.addEventListener('DOMContentLoaded', setUserProfile);
</script>

</body>
</html>
