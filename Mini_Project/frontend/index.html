<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Academic Exchange</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    /* ================= FILTER TOGGLE STYLES ================= */
    .top-filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    
    .big-search {
      flex: 1;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: white;
    }
    
    .filter-icon-btn {
      background: #2874f0;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 1.2rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 18px;
      transition: all 0.2s;
      min-width: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .filter-icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(40,116,240,0.4);
    }
    
    .filter-icon-btn.active {
      background: #ff4d4d;
    }
    
    .filter-panel.hidden {
      display: none;
    }
    
    .filter-panel {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      margin-bottom: 2rem;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .filter-panel label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }
    
    .filter-panel input[type="range"] {
      width: 100%;
      margin-bottom: 1rem;
    }
    
    #priceValue {
      font-size: 1.2rem;
      font-weight: bold;
      color: #2874f0;
    }
    
    .filter-actions {
      display: flex;
      gap: 12px;
      margin-top: 1rem;
    }
    
    @media (max-width: 768px) {
      .top-filter-bar {
        flex-direction: column;
        gap: 8px;
      }
      
      .filter-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<script>
  // Redirect to login if user not logged in
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "login.html";
  }
</script>

<header class="navbar">
  <div class="logo">Academic Exchange</div>
  <div class="nav-actions">
    <a href="chat.html">Chat</a>
    <a href="add-product.html">Add Item</a>
    <a href="my-products.html">My Products</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</header>

<main class="page">
  <h2 class="section-title">Recommended for Students</h2>

  <!-- ================= TOP FILTER BAR ================= -->
  <div class="top-filter-bar">
    <input
      type="text"
      id="searchInput"
      class="big-search"
      placeholder="Search books, subjects, notes..."
    />
    
    <!-- FILTER TOGGLE BUTTON ⇅ -->
    <button class="filter-icon-btn" id="filterToggleBtn" onclick="toggleFilters()">
      ⇅ Filters
    </button>
  </div>

  <!-- ================= FILTER PANEL (TOGGLE) ================= -->
  <div id="filterPanel" class="filter-panel hidden">
    <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
      <label>Max Price:</label>
      <span id="priceValue" style="font-size: 1.2rem; font-weight: bold; color: #2874f0;">₹1000</span>
    </div>
    
    <input
      type="range"
      id="priceSlider"
      min="0"
      max="5000"
      value="1000"
      step="50"
    />
    
    <div class="filter-actions">
      <button onclick="applyFilters()" class="primary-btn" style="flex: 1;">
        ✅ Apply Filters
      </button>
      <button onclick="clearFilters()" class="clear-btn" style="flex: 1;">
        🔄 Clear All
      </button>
    </div>
  </div>

  <!-- ================= PRODUCT GRID ================= -->
  <div id="listings" class="product-grid"></div>
</main>

<!-- ================= FILTER SCRIPTS ================= -->
<script>
  let isFilterOpen = false;
  
  // Toggle filter panel
  function toggleFilters() {
    const panel = document.getElementById('filterPanel');
    const btn = document.getElementById('filterToggleBtn');
    
    if (isFilterOpen) {
      // Hide panel
      panel.classList.add('hidden');
      btn.classList.remove('active');
      btn.innerHTML = '⇅ Filters';
      isFilterOpen = false;
    } else {
      // Show panel
      panel.classList.remove('hidden');
      btn.classList.add('active');
      btn.innerHTML = '✕ Close';
      isFilterOpen = true;
    }
  }
  
  // Apply filters
  function applyFilters() {
    const maxPrice = document.getElementById('priceSlider').value;
    
    // Filter products by price
    document.querySelectorAll('.product-card').forEach(card => {
      const priceText = card.querySelector('.price-row h3')?.textContent || '';
      const price = parseInt(priceText.replace('₹', '').replace(',', '')) || 0;
      
      if (price <= maxPrice) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
    
    toggleFilters(); // Auto-close
  }
  
  // Clear all filters
  function clearFilters() {
    document.getElementById('priceSlider').value = 1000;
    document.getElementById('priceValue').textContent = '₹1000';
    
    // Show all products
    document.querySelectorAll('.product-card').forEach(card => {
      card.style.display = 'block';
    });
    
    toggleFilters(); // Auto-close
  }
  
  // Price slider live update
  document.getElementById('priceSlider').addEventListener('input', function() {
    document.getElementById('priceValue').textContent = `₹${this.value}`;
  });
  
  // Live search
  document.getElementById('searchInput').addEventListener('input', function() {
    const query = this.value.toLowerCase();
    document.querySelectorAll('.product-card').forEach(card => {
      const title = card.querySelector('h3, .product-title')?.textContent.toLowerCase() || '';
      if (title.includes(query) || query === '') {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  });
</script>

<!-- ================= MAIN APP SCRIPT ================= -->
<script src="./js/app.js"></script>

<script>
  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
