<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat | Academic Exchange</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .welcome-left { 
      font-size: 0.9rem; 
      opacity: 0.9; 
    }

    /* ✅ RESPONSIVE CHAT LAYOUT */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
      background: #f5f5f5;
      padding: 1rem;
      gap: 1rem;
    }

    .chat-header {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .seller-info h3 {
      margin: 0 0 0.5rem 0;
      color: #333;
    }

    .seller-info #chatTitle,
    .seller-info #chatAction {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 0.3rem;
    }

    .listing-info {
      font-size: 0.95rem;
      color: #2874f0;
      font-weight: 600;
    }

    .chat-box {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      overflow-y: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 70%;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      word-wrap: break-word;
    }

    .message.sent {
      background: #2874f0;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }

    .message.received {
      background: #f0f0f0;
      color: #333;
      align-self: flex-start;
    }

    .message strong {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      opacity: 0.9;
    }

    .message p {
      margin: 0;
      font-size: 0.95rem;
    }

    .message small {
      display: block;
      font-size: 0.75rem;
      margin-top: 0.3rem;
      opacity: 0.7;
    }

    .chat-input {
      display: flex;
      gap: 0.8rem;
      background: white;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .chat-input input {
      flex: 1;
      border: 1px solid #ddd;
      padding: 0.8rem 1rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
    }

    .chat-input input:focus {
      outline: none;
      border-color: #2874f0;
      box-shadow: 0 0 0 3px rgba(40, 116, 240, 0.1);
    }

    .chat-input button {
      background: #2874f0;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .chat-input button:hover {
      background: #1a5bb8;
      transform: translateY(-1px);
    }

    /* ✅ MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .chat-container {
        height: calc(100vh - 140px);
        padding: 0.5rem;
        gap: 0.5rem;
      }

      .chat-header {
        flex-direction: column;
        align-items: flex-start;
        padding: 1rem;
      }

      .chat-box {
        padding: 1rem;
        border-radius: 8px;
      }

      .message {
        max-width: 85%;
      }

      .chat-input {
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.8rem;
      }

      .chat-input button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<script>
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "login.html";
  }
</script>

<!-- ✅ SIMPLE NAVBAR - NO PROFILE BUTTON -->
<header class="navbar">
  <div id="welcome-user" class="welcome-left"></div>
  <div class="logo">Academic Exchange</div>
  
  <div class="nav-actions">
    <a href="index.html">Home</a>
    <a href="#" onclick="logout(); return false;">Logout</a>
  </div>
</header>

<!-- ✅ CHAT CONTAINER -->
<div class="chat-container">
  <!-- Chat Header with Seller Info -->
  <div class="chat-header">
    <div class="seller-info">
      <h3>Chat with Seller</h3>
      <div id="chatTitle">Loading seller...</div>
      <div id="chatAction">Loading action...</div>
    </div>
    <div class="listing-info">
      <span id="listingTitle">Product discussion</span>
    </div>
  </div>

  <!-- Messages Container -->
  <div id="messages" class="chat-box"></div>

  <!-- Chat Input -->
  <div class="chat-input">
    <input id="msgInput" placeholder="Type message about your request..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- ✅ Socket.IO CDN -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const API_URL = "http://localhost:5000";
const token = localStorage.getItem('token');

let currentChat = null;
let socket = null;

function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

function updateUsername() {
  let username = localStorage.getItem("username") || 'User';
  
  const welcomeEl = document.getElementById('welcome-user');
  
  if (welcomeEl) welcomeEl.textContent = `Welcome, ${username}`;
  
  console.log('✅ Username updated:', username);
}

// ✅ CHAT FUNCTIONS
function initSocket() {
  socket = io(API_URL, {
    auth: { token: token }
  });

  socket.on('connect', () => {
    console.log('✅ Connected to chat server');
  });

  socket.on('receiveMessage', (data) => {
    console.log('📨 Message:', data);
    displayMessage(data.message, data.senderName, false);
  });

  socket.on('disconnect', () => {
    console.log('❌ Disconnected from chat server');
  });
}

function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    productId: params.get('productId'),
    action: params.get('action') || 'Buy',
    sellerId: params.get('sellerId'),
    sellerName: params.get('sellerName')
  };
}

function displayMessage(text, sender, isSent) {
  const messagesDiv = document.getElementById('messages');
  const messageEl = document.createElement('div');
  messageEl.className = isSent ? 'message sent' : 'message received';
  messageEl.innerHTML = `
    <strong>${sender}</strong>
    <p>${text}</p>
    <small>${new Date().toLocaleTimeString()}</small>
  `;
  messagesDiv.appendChild(messageEl);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function sendMessage() {
  const msgInput = document.getElementById('msgInput');
  const message = msgInput.value.trim();

  if (!message) {
    alert('Please type a message');
    return;
  }

  if (!socket || !currentChat) {
    alert('Chat not ready. Please wait...');
    return;
  }

  socket.emit('sendMessage', {
    listingId: currentChat.listingId,
    recipientId: currentChat.sellerId,
    message: message,
    action: currentChat.action
  });

  const username = localStorage.getItem("username") || 'You';
  displayMessage(message, username, true);
  msgInput.value = '';
}

// ✅ PAGE INITIALIZATION
document.addEventListener('DOMContentLoaded', () => {
  console.log('✅ Chat page loaded');
  
  updateUsername();
  
  const params = getQueryParams();
  
  if (!params.productId) {
    document.getElementById('messages').innerHTML = '<p>No product selected. <a href="index.html">Go back</a></p>';
    return;
  }

  currentChat = {
    listingId: params.productId,
    sellerId: params.sellerId || 'unknown',
    sellerName: params.sellerName || 'Seller',
    action: params.action
  };

  document.getElementById('chatTitle').textContent = `Seller: ${currentChat.sellerName}`;
  document.getElementById('chatAction').textContent = `Action: ${currentChat.action}`;
  document.getElementById('listingTitle').textContent = `Product #${currentChat.listingId}`;

  initSocket();
  
  console.log('✅ Chat initialized:', currentChat);
});

window.addEventListener('load', () => {
  updateUsername();
});
</script>

</body>
</html>
