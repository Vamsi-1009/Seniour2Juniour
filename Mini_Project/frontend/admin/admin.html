<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Academic Exchange</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ================= ADMIN DASHBOARD STYLES ================= */
    .admin-stats { display: flex; gap: 20px; margin-bottom: 30px; }
    .stat-card { 
      background: white; padding: 25px 20px; border-radius: 12px; 
      min-width: 220px; flex: 1; text-align: center; cursor: pointer; 
      transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; 
      height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s;
    }
    .stat-card:hover::before { left: 100%; }
    .stat-card:hover, .stat-card.active { 
      background: linear-gradient(135deg, #2874f0, #1e5fd0) !important; 
      color: white !important; transform: translateY(-4px); 
      box-shadow: 0 12px 30px rgba(40,116,240,0.3) !important;
    }
    .stat-card h3 { margin: 0 0 12px 0; font-size: 16px; color: #555; font-weight: 600; }
    .stat-card p { font-size: 32px; font-weight: bold; margin: 0; color: #2874f0; }
    .stat-card.active p { color: white !important; }
    
    .admin-section { display: none; margin-bottom: 30px; animation: fadeIn 0.3s ease; }
    .admin-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; 
      border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .admin-table th { background: linear-gradient(135deg, #f8f9fa, #e9ecef); color: #333; 
      font-weight: 600; padding: 15px 12px; text-align: left; border-bottom: 3px solid #dee2e6; }
    .admin-table td { padding: 14px 12px; border-bottom: 1px solid #f1f3f4; }
    .admin-table tr:hover { background: #f8f9ff; }
    .admin-table img { border-radius: 6px; object-fit: cover; }
    
    .back-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; }
    #backBtn { padding: 0.8rem 1.5rem; font-size: 14px; background: #6c757d; color: white; 
      border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    #backBtn:hover { background: #5a6268; transform: translateY(-1px); }
    
    .delete-btn { background: linear-gradient(135deg, #ff4d4d, #e60000); color: white; border: none; 
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; 
      transition: all 0.2s; box-shadow: 0 2px 8px rgba(255,77,77,0.3); }
    .delete-btn:hover { background: linear-gradient(135deg, #e60000, #cc0000); transform: translateY(-1px); }
    
    .page { padding: 2rem 40px; } /* Reduced padding for better fit */
    .navbar { padding: 0.8rem 40px; }
    
    @media (max-width: 768px) {
      .admin-stats { flex-direction: column; }
      .page, .navbar { padding-left: 20px; padding-right: 20px; }
      .admin-table { font-size: 14px; }
      .admin-table th, .admin-table td { padding: 10px 8px; }
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">Academic Exchange — Admin Panel</div>
  <div class="nav-actions">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<main class="page">
  <!-- ================= BACK BUTTON + TITLE ================= -->
  <div class="back-header">
    <button id="backBtn" onclick="goBackToDashboard()" style="display: none;">
      ← Back to Dashboard
    </button>
    <h2 id="pageTitle">Admin Dashboard</h2>
  </div>

  <!-- ================= DASHBOARD STATS ================= -->
  <div id="dashboardSection" class="admin-section active">
    <div class="admin-stats">
      <div class="stat-card" id="usersCard">
        <h3>Total Users</h3>
        <p id="totalUsers">0</p>
      </div>
      <div class="stat-card" id="productsCard">
        <h3>Latest Uploads</h3>
        <p id="totalProducts">0</p>
      </div>
    </div>
  </div>

  <!-- ================= USERS SECTION ================= -->
  <div id="usersSection" class="admin-section">
    <h3>All Users (Latest Registered)</h3>
    <table id="usersTable" class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Phone</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- ================= PRODUCTS SECTION ================= -->
  <div id="productsSection" class="admin-section">
    <h3>Latest Product Uploads</h3>
    <table id="productsTable" class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Price</th>
          <th>Type</th>
          <th>Seller</th>
          <th>Image</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<!-- ✅ ADMIN JS - FULL FUNCTIONALITY -->
<script src="../js/admin.js"></script>

<script>
  // ================= LOGOUT =================
  function logout() {
    localStorage.clear();
    window.location.href = "admin-login.html";
  }
</script>

</body>
</html>
