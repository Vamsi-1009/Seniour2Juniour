<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Academic Exchange</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page">

<div class="auth-wrapper">
  <div class="auth-container">
    <h1>Academic Exchange</h1>
    <p class="subtitle">Administrator Access</p>

    <div class="form-card">
      <input
        id="adminEmail"
        type="email"
        placeholder="Admin Email"
        value="admin@admin.com"
      />

      <input
        id="adminPassword"
        type="password"
        placeholder="Password"
      />

      <button
        class="primary-btn"
        type="button"
        onclick="adminLogin()"
      >
        Login
      </button>
    </div>

    <p style="margin-top:15px;">
      <a href="../login.html">← Back to User Login</a>
    </p>
  </div>
</div>

<script src="../js/admin-login.js"></script>
</body>
</html>
